<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noah's Ark | Cadastro</title>
  <style>
    :root {
      --bg: #fff8ef;
      --surface: #ffffff;
      --ink: #1e2d2f;
      --muted: #687477;
      --line: #e6ddd1;
      --teal: #1e7c7b;
      --teal-dark: #155f5e;
      --coral: #ef7254;
      --amber: #f0a51b;
      --focus: rgba(30, 124, 123, 0.18);
      --shadow: 0 24px 70px rgba(30, 45, 47, 0.14);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(239, 114, 84, 0.10), transparent 32%),
        linear-gradient(315deg, rgba(30, 124, 123, 0.12), transparent 36%),
        var(--bg);
    }

    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
    }

    .registration {
      width: min(1120px, 100%);
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(360px, 0.92fr);
      overflow: hidden;
      border: 1px solid rgba(230, 221, 209, 0.88);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .form-panel {
      padding: clamp(28px, 5vw, 56px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
    }

    .brand-mark {
      width: 54px;
      height: 54px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--teal), var(--coral));
      color: #ffffff;
      font-size: 1.65rem;
      font-weight: 800;
      box-shadow: 0 12px 28px rgba(30, 124, 123, 0.24);
    }

    .brand-text {
      display: grid;
      gap: 2px;
    }

    .brand-name {
      font-size: 1.14rem;
      font-weight: 800;
      letter-spacing: 0;
    }

    .brand-subtitle {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--coral);
      font-size: 1rem;
      font-weight: 800;
      line-height: 1.2;
    }

    .intro {
      max-width: 560px;
      margin: 0 0 30px;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
    }

    form {
      display: grid;
      gap: 18px;
    }

    .field-grid {
      display: grid;
      grid-template-columns: 1fr 0.55fr;
      gap: 16px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    label {
      font-size: 0.9rem;
      font-weight: 700;
    }

    input,
    select {
      width: 100%;
      height: 48px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 0 14px;
      color: var(--ink);
      background: #fffdf9;
      font: inherit;
      outline: none;
      transition: border-color 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    input:focus,
    select:focus {
      border-color: var(--teal);
      background: #ffffff;
      box-shadow: 0 0 0 4px var(--focus);
    }

    select {
      appearance: none;
      background-image:
        linear-gradient(45deg, transparent 50%, var(--teal) 50%),
        linear-gradient(135deg, var(--teal) 50%, transparent 50%);
      background-position:
        calc(100% - 18px) 20px,
        calc(100% - 13px) 20px;
      background-size: 5px 5px, 5px 5px;
      background-repeat: no-repeat;
      padding-right: 42px;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 8px;
    }

    button {
      min-width: 150px;
      height: 50px;
      border: 0;
      border-radius: var(--radius);
      padding: 0 22px;
      color: #ffffff;
      background: var(--teal);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      transition: background 160ms ease, transform 160ms ease, box-shadow 160ms ease;
    }

    button:hover {
      background: var(--teal-dark);
      box-shadow: 0 12px 24px rgba(21, 95, 94, 0.22);
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.72;
      transform: none;
      box-shadow: none;
    }

    .status {
      min-height: 20px;
      margin: 0;
      color: var(--teal-dark);
      font-size: 0.92rem;
      font-weight: 700;
    }

    .status.info {
      color: var(--muted);
    }

    .status.success {
      color: var(--teal-dark);
    }

    .status.error {
      color: #b44336;
    }

    .visual-panel {
      position: relative;
      min-height: 100%;
      background: #f7e7d6;
    }

    .visual-panel::before {
      content: "";
      position: absolute;
      inset: 18px;
      z-index: 1;
      border: 1px solid rgba(255, 255, 255, 0.68);
      border-radius: 8px;
      pointer-events: none;
    }

    .visual-panel img {
      width: 100%;
      height: 100%;
      min-height: 680px;
      display: block;
      object-fit: cover;
    }

    .course-strip {
      position: absolute;
      left: 24px;
      right: 24px;
      bottom: 24px;
      z-index: 2;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .course-pill {
      min-height: 44px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      padding: 8px 10px;
      color: #1e2d2f;
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(8px);
      font-size: 0.82rem;
      font-weight: 800;
      line-height: 1.15;
      text-align: center;
    }

    .course-pill:nth-child(1) {
      border-left: 5px solid var(--coral);
    }

    .course-pill:nth-child(2) {
      border-left: 5px solid var(--amber);
    }

    .course-pill:nth-child(3) {
      border-left: 5px solid var(--teal);
    }

    .course-pill:nth-child(4) {
      border-left: 5px solid #75a744;
    }

    .course-pill:nth-child(5) {
      grid-column: 1 / -1;
      border-left: 5px solid #2b5c7e;
    }

    @media (max-width: 900px) {
      main {
        padding: 18px;
        place-items: start center;
      }

      .registration {
        grid-template-columns: 1fr;
      }

      .visual-panel {
        order: -1;
        min-height: 260px;
      }

      .visual-panel img {
        min-height: 260px;
        max-height: 320px;
      }

      .course-strip {
        left: 14px;
        right: 14px;
        bottom: 14px;
      }
    }

    @media (max-width: 620px) {
      main {
        padding: 0;
      }

      .registration {
        min-height: 100vh;
        border: 0;
        border-radius: 0;
      }

      .form-panel {
        padding: 24px 18px 32px;
      }

      .brand {
        margin-bottom: 18px;
      }

      .intro {
        margin-bottom: 24px;
      }

      .field-grid {
        grid-template-columns: 1fr;
      }

      .actions {
        align-items: stretch;
        flex-direction: column;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="registration" aria-label="Cadastro Noah's Ark">
      <div class="form-panel">
        <div class="brand" aria-label="Noah's Ark">
          <div class="brand-mark" aria-hidden="true">N</div>
          <div class="brand-text">
            <span class="brand-name">Noah's Ark</span>
            <span class="brand-subtitle">Cursos e atividades</span>
          </div>
        </div>

        <h1 class="eyebrow">Venha participar das nossas atividades</h1>
        <p class="intro">Preencha os dados do participante para registrar interesse nas turmas disponíveis.</p>

        <form id="registrationForm">
          <div class="field">
            <label for="course">Curso</label>
            <select id="course" name="course" required>
              <option value="">Selecione o curso</option>
              <option value="Escolinha de Futebol">Escolinha de Futebol</option>
              <option value="Inglês">Inglês</option>
              <option value="Hip-Hop">Hip-Hop</option>
              <option value="Recreação Melhor Idade">Recreação Melhor Idade</option>
              <option value="Canto e Música">Canto e Música</option>
            </select>
          </div>

          <div class="field">
            <label for="name">Nome</label>
            <input id="name" name="name" type="text" autocomplete="name" required>
          </div>

          <div class="field-grid">
            <div class="field">
              <label for="age">Idade</label>
              <input id="age" name="age" type="number" min="1" max="120" inputmode="numeric" required>
            </div>

            <div class="field">
              <label for="city">Cidade</label>
              <input id="city" name="city" type="text" autocomplete="address-level2" required>
            </div>
          </div>

          <div class="field">
            <label for="bairro">Bairro</label>
            <input id="bairro" name="bairro" type="text" autocomplete="address-level3" required>
          </div>

          <div class="field">
            <label for="school">Escola</label>
            <input id="school" name="school" type="text" autocomplete="organization" required>
          </div>

          <div class="field-grid">
            <div class="field">
              <label for="whatsapp">WhatsApp</label>
              <input id="whatsapp" name="whatsapp" type="tel" autocomplete="tel" inputmode="tel" placeholder="(00) 00000-0000" required>
            </div>

            <div class="field">
              <label for="email">Email</label>
              <input id="email" name="email" type="email" autocomplete="email" placeholder="nome@email.com" required>
            </div>
          </div>

          <div class="actions">
            <button type="submit">Enviar</button>
            <p class="status" id="formStatus" role="status" aria-live="polite"></p>
          </div>
        </form>
      </div>

      <aside class="visual-panel" aria-hidden="true">
        <img src="assets/noahs-ark-cursos.png" alt="">
      </aside>
    </section>
  </main>

  <script>
    const WEBHOOK_URL = "https://n8n.ostracore.tech/webhook/noahs-ark-cadastro-formulario";
    const form = document.querySelector("#registrationForm");
    const statusMessage = document.querySelector("#formStatus");
    const whatsapp = document.querySelector("#whatsapp");
    const submitButton = form.querySelector("button[type='submit']");

    function setStatus(message, type) {
      statusMessage.textContent = message;
      statusMessage.className = `status ${type}`;
    }

    whatsapp.addEventListener("input", () => {
      const digits = whatsapp.value.replace(/\D/g, "").slice(0, 11);
      const area = digits.slice(0, 2);
      const first = digits.length > 10 ? digits.slice(2, 7) : digits.slice(2, 6);
      const second = digits.length > 10 ? digits.slice(7, 11) : digits.slice(6, 10);

      if (digits.length <= 2) {
        whatsapp.value = area ? `(${area}` : "";
      } else if (digits.length <= 6) {
        whatsapp.value = `(${area}) ${first}`;
      } else {
        whatsapp.value = `(${area}) ${first}-${second}`;
      }
    });

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      if (!form.checkValidity()) {
        form.reportValidity();
        return;
      }

      const formData = new FormData(form);
      const payload = {
        curso: formData.get("course"),
        nome: formData.get("name"),
        idade: Number(formData.get("age")),
        cidade: formData.get("city"),
        bairro: formData.get("bairro"),
        escola: formData.get("school"),
        whatsapp: formData.get("whatsapp"),
        email: formData.get("email"),
        origem: "github-pages",
        enviado_em: new Date().toISOString()
      };

      submitButton.disabled = true;
      submitButton.textContent = "Enviando...";
      setStatus("Enviando cadastro...", "info");

      try {
        const response = await fetch(WEBHOOK_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          throw new Error(`Erro ${response.status}`);
        }

        setStatus("Cadastro enviado com sucesso.", "success");
        form.reset();
      } catch (error) {
        setStatus("Não foi possível enviar. Tente novamente em instantes.", "error");
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = "Enviar";
      }
    });
  </script>
</body>
</html>
